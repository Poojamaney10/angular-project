name: Angular CI

on:
  push:
    branches: [ "feature-ci-cd", "deveploy", "qa", "main" ]

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t angular-project:${{ github.sha }} .

      - name: Verify Docker image
        run: |
          docker images
